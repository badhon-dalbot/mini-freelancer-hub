<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks</title>
    <link rel="stylesheet" href="../styles/tasks.css">
</head>
<body>

<div class="container">

    <h1>Task Management</h1>

    <div id="message"></div>

    <div class="card">
        <h2>Create Task</h2>

        <form id="taskForm">
            <div class="form-group">
                <label>Freelancer ID</label>
                <input
                    type="text"
                    id="freelancer_id"
                    value="f9e9d82e-1548-4572-b6b7-4edf94b5497f"
                    required
                >
            </div>

            <div class="form-group">
                <label>Title</label>
                <input
                    type="text"
                    id="title"
                    placeholder="Task title"
                    required
                >
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea
                    id="description"
                    placeholder="Task description"
                    rows="4"
                    required
                ></textarea>
            </div>

            <div class="row">

                <div class="form-group">
                    <label>Category ID</label>
                    <input
                        type="number"
                        id="category_id"
                        value="1"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Delivery Days</label>
                    <input
                        type="number"
                        id="delivery_days"
                        value="5"
                        required
                    >
                </div>

            </div>

            <button type="submit">Create Task</button>

        </form>

    </div>

    <div class="card">

        <div class="header">
            <h2>My Tasks</h2>
            <button id="refreshBtn">Refresh</button>
        </div>

        <table>

            <thead>
            <tr>
                <th>Title</th>
                <th>Task ID</th>
                <th>Status</th>
                <th>Freelancer ID</th>
            </tr>
            </thead>

            <tbody id="taskList">

            </tbody>

        </table>

    </div>

</div>

<script src="../scripts/tasks.js"></script>

</body>
</html>
